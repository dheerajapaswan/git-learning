<!DOCTYPE html>
<html>
<head>
  <title>Jenkins CI/CD Deployment</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #2563eb, #10b981);
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(0, 0, 0, 0.45);
      padding: 50px;
      border-radius: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      max-width: 850px;
    }

    h1 {
      font-size: 58px;
      margin-bottom: 20px;
      color: #00ff99;
    }

    h2 {
      font-size: 34px;
      color: #facc15;
    }

    p {
      font-size: 24px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 30px;
      background: #ef4444;
      color: white;
      border-radius: 50px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1> Jenkins CI/CD Deployment</h1>
    <h2>Version 7.0 Successfully Deployed</h2>
    <p>
      This page was deployed automatically using<br>
      <b>GitHub → Jenkins → EC2 → ALB</b>
    </p>
    <div class="badge">LIVE PRODUCTION DEMO</div>
  </div>

</body>
</html>
